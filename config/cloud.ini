[database_config]
# AutoDL云环境数据库配置（本地直连）
database = tpch
host = localhost
port = 5432
username = dbuser
password = 7684105
# TPC-H workload文件目录
workload_datapath = /root/autodl-tmp/llm/data/olap/tpch

[tuning_config]
# 调优配置（Phase 1 简化版）
tuning_method = SMAC
warmup_method = default
knob_config = knob_config/knob_config.json
sample_num = 5
suggest_num = 0
offline_sample = offline_sample/offline_sample
log_dir = ./logs
log_path = ./logs/phase1.log
result_dir = ./results

[benchmark_config]
# 基准测试配置
tool = direct
workload_path = /root/autodl-tmp/llm/data/olap/tpch/tpch_0.wg
timeout = 300

[surrogate_config]
# 代理模型配置（Phase 2使用）
model_path = surrogate/tpch.pkl
feature_path = SuperWG/feature/tpch.json
model_type = qwen
lora_rank = 64
