[database_config]
# 数据库连接配置（本地直连，无需SSH）
database = tpch
host = localhost
port = 5432
username = dbuser
password = 7684105
# 工作负载目录
workload_datapath = /root/autodl-tmp/llm/data/olap/tpch

[tuning_config]
# 参数调优配置
tuning_method = SMAC
warmup_method = workload_map
online = false
knob_config = knob_config/knob_config.json
sample_num = 50
suggest_num = 75
online_sample = online_sample
offline_sample = offline_sample/offline_sample
finetune_sample = finetune_sample
inner_metric_sample = inner_metric_sample
log_dir = ./logs
log_path = ./logs/tuning.log
result_dir = ./results

[benchmark_config]
# 基准测试配置
tool = direct
workload_path = SuperWG/res/gpt_workloads/tpch_workload
timeout = 300

[surrogate_config]
# 代理模型配置
model_path = surrogate/tpch.pkl
feature_path = SuperWG/feature/tpch.json
model_type = qwen
lora_rank = 64
